name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          GITHUB_ACTIONS: "true"
        run: npm run build

      - name: Generate static index.html & 404.html for SPA fallback
        run: |
          CSS_FILE=$(basename $(ls .output/public/assets/styles-*.css | head -n 1))
          CLIENT_JS=$(basename $(ls .output/public/assets/index-*.js | head -n 1))
          cat <<EOF > .output/public/index.html
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>ENR — Egyptian National Railways | الهيئة القومية لسكك حديد مصر</title>
              <link rel="stylesheet" href="/ENR/assets/${CSS_FILE}" />
            </head>
            <body>
              <script type="module" src="/ENR/assets/${CLIENT_JS}"></script>
            </body>
          </html>
          EOF
          cp .output/public/index.html .output/public/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ".output/public"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
