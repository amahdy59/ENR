name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          GITHUB_ACTIONS: "true"
        run: npm run build

      - name: Generate static index.html & 404.html for SPA fallback
        run: |
          node -e "
            import('fs/promises').then(fs => 
              import('./.output/server/index.mjs').then(async m => { 
                const res = await m.default.fetch(new Request('http://localhost/ENR/'), {}); 
                const text = await res.text(); 
                await fs.writeFile('.output/public/index.html', text); 
                await fs.writeFile('.output/public/404.html', text); 
                console.log('Successfully generated index.html and 404.html from Nitro server!');
              })
            ).catch(err => {
              console.error(err);
              process.exit(1);
            });
          "

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ".output/public"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
