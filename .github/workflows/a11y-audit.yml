name: Accessibility audits

# Runs on every PR that touches UI, styles, or audit scripts. Two jobs:
#   1. Fast static contrast audit over src/styles.css tokens (no browser).
#   2. Playwright + axe-core audit of the mobile home + search page and
#      each filter bottom sheet against WCAG 2.1 A/AA.

on:
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "scripts/audit-*.mjs"
      - ".github/workflows/a11y-audit.yml"
      - "package.json"
      - "bun.lock"
      - "bun.lockb"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  contrast:
    name: Token contrast (light + dark)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run WCAG AAA contrast audit
        run: node scripts/audit-contrast.mjs

  mobile-a11y:
    name: Mobile a11y (axe-core, WCAG 2.1 A/AA)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - name: Build (development mode)
        run: bun run build:dev
      - name: Start preview server
        run: bun run preview --port 8080 &
      - name: Wait for server
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:8080/ > /dev/null; then
              echo "Server up"; exit 0
            fi
            sleep 1
          done
          echo "Server never came up"; exit 1
      - name: Run mobile a11y audit
        env:
          AUDIT_URL: http://localhost:8080
        run: node scripts/audit-a11y-mobile.mjs
