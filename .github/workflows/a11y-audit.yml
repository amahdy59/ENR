name: Accessibility & Quality Audits

on:
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "scripts/audit-*.mjs"
      - ".github/workflows/a11y-audit.yml"
      - "package.json"
      - "package-lock.json"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    name: Code Quality & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Run TypeScript typecheck
        run: npx tsc --noEmit

  contrast:
    name: Token contrast (light + dark)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run WCAG AAA contrast audit
        run: node scripts/audit-contrast.mjs

  mobile-a11y:
    name: Mobile a11y (axe-core, WCAG 2.1 A/AA)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Start dev server
        run: CI=true npm run dev -- --port 8080 --host < /dev/null &
      - name: Wait for server
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:8080/ > /dev/null; then
              echo "Server up"; exit 0
            fi
            sleep 1
          done
          echo "Server never came up"; exit 1
      - name: Run mobile a11y audit
        env:
          AUDIT_URL: http://localhost:8080
        run: node scripts/audit-a11y-mobile.mjs
